spring.application.name=bms
server.port = 2233

#data base connection 
spring.datasource.url=jdbc:mysql://localhost:3306/bookmyshow?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate and JPA Properties (Optional but useful)
# 'update' automatically updates the database schema based on your JPA entities
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.hibernate.ddl-auto=create
# Specifies the SQL dialect for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Shows generated SQL in the console (useful for development)
spring.jpa.show-sql=true
